apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: dev

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx-app

  template:
    metadata:
      labels:
        app: nginx-app

    spec:
      containers:
        - name: app
          image: nginx

          resources:
            requests:
              cpu: "250m"
              memory: "500Mi"

            limits:
              cpu: "500"
              memory: "1Gi"