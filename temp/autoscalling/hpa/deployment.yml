apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
        - name: nginx
          image: nginx

          resources:
            requests: 
              cpu: "50m"
              memory: "50Mi"
            
            limits: 
              cpu: "60m"
              memory: "60Mi"