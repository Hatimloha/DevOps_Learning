apiVersion: apps/v1
kind: DaemonSet

metadata:
  name: fluent-bit

spec:
  selector:
    matchLabels:
      app: fluent-bit

  template:
    metadata:
      labels:
        app: fluent-bit

    spec:
      nodeSelector:
        role: worker
        
      containers:
      - name: fluent-bit
        image: fluent/fluent-bit