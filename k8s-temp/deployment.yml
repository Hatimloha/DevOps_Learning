apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deplpyment
  labels:
    app: nginx-app

spec:
  replicas: 3

  selector:
    matchLabels:
        app: nginx-app
    
  template:
    metadata:
      labels:
        app: nginx-app

    spec:
      containers:
        - name: nginx-app
          image: nginx

          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
