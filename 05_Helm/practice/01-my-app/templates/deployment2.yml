apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Values.selector.app }}

  template:
    metadata:
      labels:
        app: {{ .Values.selector.app }}

    spec:
      containers:
        - name: nginx
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: {{ index .Values.ports 0 }}