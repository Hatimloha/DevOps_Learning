apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: ecommerce

spec:
  replicas: 2

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1


  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend
  
    spec:
    # Pod scheduling 
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: backend

    
    # Graceful Shutdown: If Kubernetes kills a Pod immediately:
      terminationGracePeriodSeconds: 30

    # Docker image pull
      imagePullSecrets:
        - name: dockerhub-secret

      containers:
        - name: backend
          image: hatimlohawala/backend:v6       

          # Security
          securityContext:
            # Use non-root user
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true

            # Allow to read the file only
            readOnlyRootFilesystem: true


            # Drop Linux Capabilities
            capabilities:
              drop: 
                - ALL

            # Prevent Privilege Escalation
            allowPrivilegeEscalation: false


        # Expose Port 
          ports:
            - containerPort: 3000

        #  ENV variable call
          envFrom:
          - configMapRef:
              name: app-config
          - secretRef:
              name: app-secret


        # Probes
          startupProbe:
            httpGet:
              path: /health
              port: 3000

            periodSeconds: 5
            failureThreshold: 20
          
          readinessProbe:
            httpGet:
              path: /health
              port: 3000

            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 3000

            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3


        # Resources     
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

            
