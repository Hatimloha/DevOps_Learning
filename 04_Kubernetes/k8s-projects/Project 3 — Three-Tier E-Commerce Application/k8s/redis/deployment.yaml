apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis
  namespace: ecommerce

spec:
  replicas: 1

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:

      - name: redis

        image: redis:7-alpine

        ports:
        - containerPort: 6379

        startupProbe:
          tcpSocket:
            port: 6379

          periodSeconds: 10
          failureThreshold: 20

        readinessProbe:
          tcpSocket:
            port: 6379

          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          tcpSocket:
            port: 6379

          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      
        resources:
            requests:
              cpu: "50m"
              memory: "64Mi"

            limits:
              cpu: "200m"
              memory: "256Mi"