apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: ecommerce

spec:
  replicas: 1

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:  
      containers:
      - name: postgres
        image: postgres:15

        startupProbe:
          tcpSocket:
            port: 5432

          periodSeconds: 10
          failureThreshold: 20

        readinessProbe:
          tcpSocket:
            port: 5432

          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          tcpSocket:
            port: 5432

          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

        ports:
        - containerPort: 5432

        env:

        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_NAME

        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD

        volumeMounts:

        - mountPath: /var/lib/postgresql/data
          name: postgres-storage

      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc