apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: ecommerce

spec:
  replicas: 2

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1


  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      imagePullSecrets:
        - name: dockerhub-secret

      containers:
        - name: frontend
          image: hatimlohawala/frontend:v2

          # securityContext:
          #   # Use non-root user
          #   runAsUser: 1000
          #   runAsGroup: 1000
          #   runAsNonRoot: true

          #   # Allow to read the file only
          #   # readOnlyRootFilesystem: true


          #   # Drop Linux Capabilities
          #   capabilities:
          #     drop: 
          #       - ALL

          #   # Prevent Privilege Escalation
          #   allowPrivilegeEscalation: false


          ports:
            - containerPort: 80

          env:
            - name: VITE_BACKEND
              valueFrom: 
                configMapKeyRef:
                  name: app-config
                  key: VITE_BACKEND

          livenessProbe:
            httpGet:
              path: /
              port: 80
            
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
           
          readinessProbe:
            httpGet:
              path: /
              port: 80

            initialDelaySeconds: 5
            periodSeconds: 5

          resources:
            requests:
              cpu: "25m"
              memory: "100Mi"

            limits:
              cpu: "100m"
              memory: "128Mi"
