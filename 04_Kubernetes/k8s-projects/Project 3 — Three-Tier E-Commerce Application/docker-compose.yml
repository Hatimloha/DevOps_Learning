version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: products

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always

    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: node_backend
    restart: always

    environment:
      PORT: 3000
      
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: products

      REDIS_HOST: redis
      REDIS_PORT: 6379


    ports:
      - "3000:3000"

    depends_on:
      - postgres
      - redis

volumes:
  pgdata: