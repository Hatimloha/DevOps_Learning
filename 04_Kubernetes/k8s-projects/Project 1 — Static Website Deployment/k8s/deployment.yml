apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-website
  namespace: project1

spec:
  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1 

  replicas: 3

  selector:
    matchLabels:
      app: static-website

  template:
    metadata:
      labels:
        app: static-website

    spec:
      imagePullSecrets:
        - name: dockerhub-secret


      containers:
        - name: static-website
          image: hatimlohawala/k8s-static-website:v2

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10