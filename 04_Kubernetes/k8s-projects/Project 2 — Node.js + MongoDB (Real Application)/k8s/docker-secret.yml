apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-secret
  namespace: project2

type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "https://index.docker.io/v1/": {
          "username": "<dockerhub username>",
          "password": "<dockerhub token || password>",
          "email": "<your email>",
          "auth": "<dockerUsername:password (onvert into base64)>"
        }
      }
    }
