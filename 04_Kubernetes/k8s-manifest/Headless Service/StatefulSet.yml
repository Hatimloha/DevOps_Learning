apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql

spec:
  serviceName: mysql
  replicas: 3

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
      - name: mysql
        image: mysql:8.0

        env:
        - name: MYSQL_ROOT_PASSWORD
          value: root123

        - name: MYSQL_DATABASE
          value: mydb

        ports:
        - containerPort: 3306

# Import: volumeClaimTemplates
    volumeClaimTemplates:
      - metadata:
          name: mysql-storage

        spec:
          accessMode:
            - ReadWriteOnce
          
          resources:
            requests:
              storage: 5Gi
