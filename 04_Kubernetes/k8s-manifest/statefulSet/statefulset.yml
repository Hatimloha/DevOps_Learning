apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nginx-statefulset

spec:
  serviceName: nginx-statefulset

  replicas: 3

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
      - name: nginx
        image: nginx

        ports:
        - containerPort: 80

  volumeClaimTemplates:
  - metadata:
      name: nginx-storage

    spec:
      accessModes:
      - ReadWriteOnce

      resources:
        requests:
          storage: 1Gi

      