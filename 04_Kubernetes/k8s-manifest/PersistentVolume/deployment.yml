apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvc-deployment

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx


    spec:
      containers:
      - name: nginx
        image: nginx

        volumeMounts:
          - name: app-storage
            mountPath: /usr/share/nginx/html

        
      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: app-pvc