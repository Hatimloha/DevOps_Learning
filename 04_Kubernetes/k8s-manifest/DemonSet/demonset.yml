# 1 pod in every node  

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-demonset

spec:
  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
        - name: nginx
          image: nginx

          ports:
            - containerPort: 80
